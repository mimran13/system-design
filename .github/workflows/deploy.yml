name: Build site (link check gate)

# The site is local-only for now: this workflow only validates that the site
# builds cleanly with --strict (broken links / nav errors fail the build).
#
# ── To publish to GitHub Pages later ─────────────────────────────────────
# 1. Repo Settings → Pages → Source → "GitHub Actions"
# 2. Uncomment the `pages: write` / `id-token: write` permissions, the
#    upload-pages-artifact step, and the deploy job below.
# 3. Push — the site publishes to https://<user>.github.io/system-design/
# Note: on a private repo with the free plan, Pages makes the site PUBLIC.
# ──────────────────────────────────────────────────────────────────────────

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  # pages: write      # ← uncomment for Pages deploy
  # id-token: write   # ← uncomment for Pages deploy

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # full history so git-revision-date-localized can compute real dates
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - run: pip install -r requirements.txt

      - run: mkdocs build --strict

      # ── Uncomment to deploy to GitHub Pages ──
      # - uses: actions/upload-pages-artifact@v3
      #   with:
      #     path: site

